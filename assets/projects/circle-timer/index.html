<!doctype html>
<html lang="en" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>circle timer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container startBox">
  <div>
    <input id="input" type="number" placeholder="لطفا عدد مورد نظر را وارد کنید">
  </div>
  <div>
    <button id="submit">ثبت</button>
  </div>
</div>
<div class="container">
  <p class="errorMessage" style="color: red;">
  </p>
</div>

<div class="container">
  <div class="c100 p50">
    <span class="circleTime">250</span>
    <div class="slice">
      <div class="bar"></div>
      <div class="fill"></div>
    </div>
  </div>
</div>

<div class="container">
  <p class="countMessage" style="color: deepskyblue;">
  
  </p>
</div>

<script src="script.js"></script>
</body>
</html>
